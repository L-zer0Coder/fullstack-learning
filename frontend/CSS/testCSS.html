<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .banner {
            height: 777px;
            background-color: #f3f3f4;
            background-image: url(../HTML/imgTest/3.png);
            background-repeat: no-repeat;
            background-position: left bottom;

            /* 文字控制属性可以继承给子集 */
            text-align: right;
            color: #dd40a1;
        }
        /* 注意写法 */
        .banner h2 { 
            font-size: 36px;
            font-weight: 400;
            line-height: 100px;
        }
        .banner p {
            font-size: 20px;
        }
        .banner a {
            width: 125px;
            height: 40px;
            background-color: red;
            /* block不行 块独占一行，无法右对齐 */
            display: inline-block;
            text-align: center;
            line-height: 40px;
            color: #fff;
            text-decoration: none;
            font-size: 20px;
        }
        .banner a:hover {
            background-color: #21216d;
        }
    </style>
</head>
<body>
    <!-- 布局大区域都用div 故要差异化 -->
    <div class="banner">
        <h2>你挖到钻石了！</h2>
        <p>这里提供专业指导与优质矿洞，快来加入我们吧！</p>
        <a href="#">点击挖矿</a>
    </div>
</body>
</html>
